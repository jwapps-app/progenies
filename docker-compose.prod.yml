# Production stack (NAS / Portainer / any single-host Docker).
#
# Uses prebuilt images published to GitHub Container Registry by CI on every
# push to main — no building on the deployment host:
#
#   docker compose -f docker-compose.prod.yml up -d
#
# Required environment variables (set in Portainer's stack editor or a .env):
#   SECRET_KEY         JWT signing key — generate with: openssl rand -hex 32
#   POSTGRES_PASSWORD  database password for this instance
# Optional:
#   HTTP_PORT          host port for the web app (default 8080)
#   DATA_PATH          host folder for persistent data (default ./data)
#   APP_NAME           display name (default Progenies)
#   IMAGE_TAG          image tag to deploy (default latest). CI also publishes
#                      per-commit tags (the git SHA), so a bad deploy can be
#                      rolled back by pinning IMAGE_TAG to the last good SHA.
#
# The web container serves the built SPA and proxies /api and /auth to the
# backend on the same origin, so a reverse proxy / tunnel only needs to point
# at HTTP_PORT. The database is not exposed outside the stack network.
#
# Backups: the db-backup sidecar runs pg_dump daily at 01:30 into
# ${DATA_PATH}/backups (gzip, rotated: 7 daily / 4 weekly / 6 monthly). Point
# the NAS's own backup job at that folder for off-machine copies.

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-progenies}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-genealogy}
    volumes:
      - ${DATA_PATH:-./data}/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-progenies} -d ${POSTGRES_DB:-genealogy}"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-backup:
    image: prodrigestivill/postgres-backup-local:15-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-progenies}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-genealogy}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: "7"
      BACKUP_KEEP_WEEKS: "4"
      BACKUP_KEEP_MONTHS: "6"
      HEALTHCHECK_PORT: "8080"
    volumes:
      - ${DATA_PATH:-./data}/backups:/backups

  backend:
    image: ghcr.io/jwapps-app/progenies-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-Progenies}
      DATABASE_URL: postgresql://${POSTGRES_USER:-progenies}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-genealogy}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY (openssl rand -hex 32)}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    image: ghcr.io/jwapps-app/progenies-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
