# Shared security response headers (included by every location in nginx.conf).
# `always` so they're sent on error responses too.
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# HTTPS is terminated at the Cloudflare edge; tell browsers to stay on it.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
# The app is fully same-origin. Inline script/style are allowed because the SPA
# ships a small inline theme-flash guard in index.html and Tailwind/React set
# inline styles; everything else is locked to 'self'. Images allow data: URLs
# (profile photos are stored as data URIs).
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
