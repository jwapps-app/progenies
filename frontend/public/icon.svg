<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full-bleed opaque square: installed-icon platforms (iOS home screen,
       Android maskable) apply their own corner masking, so the source must be
       a solid square with the mark inside the safe zone — not pre-rounded. -->
  <rect width="512" height="512" fill="#1e3a5f" />
  <g transform="translate(0 12) scale(8)">
    <circle cx="32" cy="18" r="7" fill="#c9a227" />
    <circle cx="18" cy="44" r="6" fill="#f8fafc" />
    <circle cx="46" cy="44" r="6" fill="#f8fafc" />
    <path d="M32 25 V34 M32 34 H18 V38 M32 34 H46 V38" stroke="#f8fafc" stroke-width="2.5" fill="none" />
  </g>
</svg>
