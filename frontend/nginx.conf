# Production web server: serves the built SPA and proxies the API on the same
# origin, so a single domain (and a single tunnel/port) fronts the whole app.

# Security headers shared by every response. Defined once and pulled into each
# location with `include` — nginx does NOT inherit add_header into a location
# that declares its own add_header, so every location must re-include these.
# (This file is copied to /etc/nginx/snippets/security-headers.conf.)

server {
    # 8080, not 80: the nginx-unprivileged base image runs as a non-root user
    # and cannot bind privileged ports. The host port mapping is unchanged.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # GEDCOM uploads / photo data-URLs can be sizeable.
    client_max_body_size 25m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/manifest+json image/svg+xml;
    gzip_min_length 1024;

    # Backend API — same-origin proxy (the SPA calls relative /api and /auth;
    # /public serves the unauthenticated share-link data). /docs and /openapi
    # are intentionally NOT proxied — they're disabled in the backend for prod.
    location ~ ^/(api|auth|public|health) {
        include /etc/nginx/snippets/security-headers.conf;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Hashed build assets are immutable — cache aggressively.
    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Service worker must always revalidate.
    location = /sw.js {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # SPA fallback: any other route is client-side.
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
