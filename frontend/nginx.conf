# Production web server: serves the built SPA and proxies the API on the same
# origin, so a single domain (and a single tunnel/port) fronts the whole app.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # GEDCOM uploads / photo data-URLs can be sizeable.
    client_max_body_size 25m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/manifest+json image/svg+xml;
    gzip_min_length 1024;

    # Backend API — same-origin proxy (the SPA calls relative /api and /auth).
    location ~ ^/(api|auth|health|docs|openapi\.json|redoc) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Hashed build assets are immutable — cache aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Service worker must always revalidate.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA fallback: any other route is client-side.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
